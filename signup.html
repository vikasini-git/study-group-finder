
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account — StudyTribe</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="style.css">
    
    <style>
        :root {
            --brand-primary: #328CC1;
            --brand-dark: #0B3C5D;
            --brand-accent: #D9B310;
            --bg-main: #F8FAFC;
            --border-color: #E2E8F0;
            --text-main: #1E293B;
            --text-muted: #64748B;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg-main);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            font-family: 'DM Sans', sans-serif;
        }
        .auth-container {
            width: 100%;
            max-width: 440px;
            background: #FFFFFF;
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 40px 30px;
            box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.05);
        }
        .auth-header {
            text-align: center;
            margin-bottom: 24px;
        }
        .auth-header .logo {
            font-size: 26px;
            font-weight: 700;
            color: var(--brand-dark);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .auth-header h2 {
            font-size: 22px;
            color: var(--text-main);
            margin-top: 10px;
        }
        .auth-header p {
            font-size: 14px;
            color: var(--text-muted);
            margin-top: 4px;
        }
        .input-group {
            margin-bottom: 16px;
        }
        .input-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--text-main);
        }
        .input-wrapper {
            position: relative;
        }
        .input-wrapper i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #94A3B8;
            font-size: 14px;
        }
        .input-wrapper input {
            width: 100%;
            padding: 12px 16px 12px 40px;
            border: 1px solid #CBD5E1;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            font-family: 'DM Sans', sans-serif;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }
        .input-wrapper input:focus {
            border-color: var(--brand-primary);
            box-shadow: 0 0 0 3px rgba(50, 140, 193, 0.15);
        }
        .auth-error-msg {
            padding: 10px 14px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 16px;
            display: none;
        }
        .alert-error { background: #FEE2E2; color: #991B1B; border: 1px solid #FCA5A5; }
        .alert-success { background: #DCFCE7; color: #166534; border: 1px solid #86EFAC; }
        
        .btn-submit {
            width: 100%;
            background: var(--brand-primary);
            color: #FFFFFF;
            border: none;
            border-radius: 8px;
            padding: 12px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: background 0.2s ease;
        }
        .btn-submit:hover {
            background: var(--brand-dark);
        }
        .auth-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 13px;
            color: var(--text-muted);
        }
        .auth-footer a {
            color: var(--brand-primary);
            text-decoration: none;
            font-weight: 600;
        }
        .auth-footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="auth-header">
            <div class="logo">
                <i class="fa-solid fa-graduation-cap" style="color: var(--brand-primary);"></i> StudyTribe
            </div>
            <h2>Create Account</h2>
            <p>Collaborate with verified peers instantly</p>
        </div>

        <div class="auth-error-msg" id="authAlert"></div>

        <form id="signupForm">
    <div class="input-group">
        <label for="username">Full Name</label>
        <div class="input-wrapper">
            <i class="fa-solid fa-user"></i>
            <input type="text" id="username" placeholder="Enter your full name" required>
        </div>
    </div>

    <div class="input-group">
        <label for="email">Institutional Email</label>
        <div class="input-wrapper">
            <i class="fa-solid fa-envelope"></i>
            <input type="email" id="email" placeholder="name@yourcollege.org" required>
        </div>
    </div>

    <div class="input-group">
        <label for="password">Password</label>
        <div class="input-wrapper">
            <i class="fa-solid fa-lock"></i>
            <input type="password" id="password" placeholder="Create a strong password" required>
        </div>
    </div>

    <div class="input-group">
        <label for="confirmPassword">Confirm Password</label>
        <div class="input-wrapper">
            <i class="fa-solid fa-shield"></i>
            <input type="password" id="confirmPassword" placeholder="Repeat your password" required>
        </div>
    </div>

    <button type="submit" class="btn-submit">
        Register Account <i class="fa-solid fa-user-plus"></i>
    </button>
</form>
        <div class="auth-footer">
            Already have an account? <a href="login.html">Sign In</a>
        </div>
    </div>

    <script>
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (password !== confirmPassword) {
                showAlert('Passwords do not match!', 'error');
                return;
            }

            try {
                let userDatabase = JSON.parse(localStorage.getItem('db_users')) || [];
                
                const userExists = userDatabase.find(u => u.email === email);
                if (userExists) {
                    throw new Error("This email is already registered inside the database.");
                }

                userDatabase.push({ name, email, password });
                localStorage.setItem('db_users', JSON.stringify(userDatabase));
                
                localStorage.setItem('session_token', JSON.stringify({ name, email }));

                showAlert('Registration successful! Redirecting... ✓', 'success');
                setTimeout(() => { window.location.href = 'dashboard.html'; }, 1500);

            } catch (err) {
                showAlert(err.message, 'error');
            }
        });

        function showAlert(msg, type) {
            const alertBox = document.getElementById('authAlert');
            alertBox.className = `auth-error-msg ${type === 'success' ? 'alert-success' : 'alert-error'}`;
            alertBox.textContent = msg;
            alertBox.style.display = 'block';
        }
    </script>
</body>
</html>
